name: pathwaybench
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python core
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - scanpy
  - anndata
  - matplotlib
  - seaborn
  - snakemake
  # R core
  - r-base=4.3
  - r-tidyverse
  - r-ggplot2
  - r-patchwork
  - r-pheatmap
  - r-rcolorbrewer
  - r-ggpubr
  - r-scales
  - r-yaml
  - r-optparse
  - r-data.table
  - r-matrix
  - r-jsonlite
  - r-corrplot
  - r-reshape2
  - r-reticulate
  - r-devtools
  # sctransform is a CRAN package (not Bioconductor)
  - r-sctransform
  # Bioconductor packages
  - bioconductor-gsva
  - bioconductor-aucell
  - bioconductor-singlecellexperiment
  - bioconductor-summarizedexperiment
  - bioconductor-edger
  - bioconductor-limma
  - bioconductor-deseq2
  - bioconductor-scran
  - bioconductor-scater
  - bioconductor-decoupler
  - bioconductor-reactome.db
  - bioconductor-org.hs.eg.db
  - bioconductor-gseabase
  - bioconductor-ucell
  # Shiny app
  - r-shiny
  # Seurat
  - r-seurat
  # pip-only packages (not available on conda channels)
  - pip:
    - cellxgene-census
    - tiledbsoma
