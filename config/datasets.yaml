# PathwayBench Dataset Configuration
# ====================================
# Each dataset defines: disease, tissue, cell types to pseudobulk,
# conditions to compare, and CellxGene query filters.

datasets:
  # ---- KIDNEY DISEASES ----
  t2d_kidney:
    name: "Type 2 Diabetes - Kidney"
    disease_query: "type 2 diabetes mellitus"
    control_query: "normal"
    tissue: "kidney"
    organism: "homo_sapiens"
    cell_types:
      - "proximal tubule cell"
      - "podocyte"
      - "thick ascending limb cell"
      - "distal tubule cell"
    assay_filter: "10x 3' v3"
    min_cells_per_sample: 30
    ground_truth_pathways:
      - interferon_signaling
      - jak_stat
      - insulin_signaling
      - glucose_metabolism
      - nfkb_signaling

  dkd_kidney:
    name: "Diabetic Kidney Disease"
    disease_query: "diabetic nephropathy"
    control_query: "normal"
    tissue: "kidney"
    organism: "homo_sapiens"
    cell_types:
      - "proximal tubule cell"
      - "podocyte"
      - "endothelial cell"
      - "fibroblast"
    assay_filter: null
    min_cells_per_sample: 30
    ground_truth_pathways:
      - nfkb_signaling
      - tgfb_signaling
      - raas
      - oxidative_stress
      - ecm_remodeling

  # ---- LUNG DISEASES ----
